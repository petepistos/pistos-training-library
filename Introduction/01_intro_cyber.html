<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Introduction to Cybersecurity — Pistos Information Protection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F1EB; --surface:#ffffff; --surface2:#EDE8E0;
  --border:#D6CCBC; --text:#2E2A25; --muted:#5A4E3F;
  --navy:#1B2A4A; --navy-light:#2a3a5e; --navy-dark:#0f1a32;
  --gold:#C4AA88; --gold-deep:#A08860; --cream:#D6CCBC;
  --danger:#9B2B2B; --good:#2d6a2d;
  --hl-bg:rgba(196,170,136,0.10);
  --hl-shadow:0 0 0 1.5px rgba(196,170,136,0.25);
  --radius:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",-apple-system,sans-serif;overflow:hidden;}
body{display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{flex:0 0 auto;background:#fff;border-bottom:1.5px solid var(--border);padding:0 28px;height:74px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{height:58px;width:auto;display:block;}
.brand-text{display:flex;flex-direction:column;border-left:1.5px solid var(--border);padding-left:14px;justify-content:center;}
.module-name{font-family:"IBM Plex Sans",sans-serif;font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.2px;line-height:1.2;}
.module-sub{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--gold-deep);letter-spacing:1.5px;margin-top:3px;}
.top-controls{display:flex;align-items:center;gap:12px;}
.audio-toggle{display:flex;align-items:center;gap:8px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);cursor:pointer;user-select:none;padding:7px 14px;border:1px solid var(--border);border-radius:5px;background:var(--bg);transition:all .15s;}
.audio-toggle:hover{border-color:var(--navy);color:var(--navy);}
.audio-toggle.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.audio-toggle .icon{width:14px;height:14px;display:inline-block;}
.audio-toggle .icon::before{content:"▶";font-size:10px;}
.audio-toggle.active .icon::before{content:"■";}

/* CHAPTER PILL BAR */
.chapter-bar{flex:0 0 auto;background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:44px;display:flex;align-items:center;gap:8px;overflow-x:auto;}
.chapter-pill{background:none;border:none;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:"IBM Plex Mono",monospace;transition:all .15s;}
.chapter-pill:hover{background:var(--surface2);color:var(--text);}
.chapter-pill.active{background:var(--navy);color:#fff;font-weight:600;}
.chapter-pill.done{color:var(--gold-deep);}

/* STAGE */
.stage{flex:1 1 auto;display:grid;grid-template-columns:1fr 1.1fr;gap:0;overflow:hidden;position:relative;}
.stage.cover,.stage.quiz-stage{grid-template-columns:1fr;}

/* DIAGRAM PANE */
.diagram-pane{background:#fff;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;position:relative;}
.diagram-pane::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(196,170,136,0.04) 0%,transparent 60%),radial-gradient(circle at 80% 80%,rgba(27,42,74,0.04) 0%,transparent 60%);pointer-events:none;}
.diagram-pane svg{max-width:100%;max-height:100%;width:auto;height:auto;position:relative;z-index:1;}
.pistos-watermark{position:absolute;bottom:14px;right:18px;display:flex;align-items:center;gap:6px;opacity:0.32;pointer-events:none;z-index:2;}
.pistos-watermark img{height:34px;width:auto;}
.pistos-watermark .wm-text{font-family:"IBM Plex Mono",monospace;font-size:8.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}

/* NARRATIVE PANE */
.narrative-pane{overflow-y:auto;padding:28px 32px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.narrative-pane::-webkit-scrollbar{width:6px;}
.narrative-pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.chapter-header{margin-bottom:22px;}
.chapter-header .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;color:var(--navy);letter-spacing:1px;margin-bottom:6px;}
.chapter-header h1{font-family:"IBM Plex Sans",sans-serif;font-size:22px;font-weight:600;color:var(--text);line-height:1.3;}
.chapter-header .chapter-sub{font-family:"IBM Plex Sans",sans-serif;font-size:13px;color:var(--muted);margin-top:4px;}

/* BEAT BLOCK */
.beat{background:#fff;border-radius:var(--radius);margin-bottom:12px;border-left:4px solid transparent;overflow:hidden;transition:all .35s ease;transform:translateX(8px);opacity:0.35;}
.beat.visible{opacity:1;transform:translateX(0);}
.beat.active{border-left-color:var(--gold);background:var(--hl-bg);box-shadow:var(--hl-shadow);}
.beat.done{border-left-color:var(--gold-deep);}
.beat-inner{padding:14px 18px;}
.beat-title{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--navy);margin-bottom:6px;}
.beat.active .beat-title{color:var(--gold-deep);}
.beat-body{font-family:"IBM Plex Sans",sans-serif;font-size:13px;line-height:1.65;color:var(--muted);}

/* SVG REGION STATES */
.svg-region{transition:opacity .35s ease,transform .35s ease;transform-origin:center;transform-box:fill-box;}
.svg-region.dim{opacity:0.32;}
.svg-region.active{opacity:1;}
.svg-region.active .svg-region-glow{animation:pulseGlow 2.4s ease-in-out infinite;}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.18);opacity:0.9;}}

/* COVER */
.stage.cover .narrative-pane,.stage.cover .diagram-pane{display:none;}
.stage.cover{display:flex;align-items:center;justify-content:center;background:var(--navy);position:relative;overflow:hidden;}
.stage.cover::before{content:"";position:absolute;inset:0;background:
  radial-gradient(ellipse at 30% 20%,rgba(196,170,136,0.18) 0%,transparent 50%),
  radial-gradient(ellipse at 70% 80%,rgba(196,170,136,0.10) 0%,transparent 55%);
}
.stage.cover::after{content:"";position:absolute;inset:0;background-image:
  linear-gradient(rgba(196,170,136,0.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(196,170,136,0.025) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;}
.cover-content{color:#fff;text-align:center;padding:0 32px;max-width:760px;position:relative;z-index:2;}
.cover-logo{display:flex;justify-content:center;margin-bottom:20px;}
.cover-logo img{height:130px;width:auto;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.4));}
.cover-content .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--gold);letter-spacing:4px;margin-bottom:24px;}
.cover-content .rule{width:200px;height:1px;background:var(--gold);margin:0 auto 32px;position:relative;}
.cover-content .rule::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:var(--gold);}
.cover-content h1{font-family:"IBM Plex Sans",sans-serif;font-size:42px;font-weight:600;line-height:1.15;margin-bottom:14px;color:#fff;}
.cover-content h2{font-family:"IBM Plex Sans",sans-serif;font-weight:300;font-size:18px;color:var(--gold);line-height:1.4;margin-bottom:32px;}
.cover-content .lead{font-family:"IBM Plex Sans",sans-serif;font-size:15px;line-height:1.7;color:rgba(255,255,255,0.78);max-width:560px;margin:0 auto 44px;}
.cover-content .start-btn{background:var(--gold);color:var(--navy);border:none;padding:13px 34px;font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:all .15s;box-shadow:0 6px 20px rgba(196,170,136,0.35);}
.cover-content .start-btn:hover{background:#fff;transform:translateY(-2px);box-shadow:0 10px 30px rgba(196,170,136,0.5);}
.cover-content .hint{margin-top:32px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;}
.cover-content .hint kbd{background:rgba(255,255,255,0.1);padding:3px 7px;border-radius:3px;margin:0 3px;font-family:"IBM Plex Mono",monospace;font-size:10px;}

/* QUIZ */
.stage.quiz-stage{background:var(--bg);overflow-y:auto;padding:32px;}
.quiz-container{max-width:780px;margin:0 auto;width:100%;}
.quiz-heading{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px;letter-spacing:1px;}
.quiz-sub{font-family:"IBM Plex Sans",sans-serif;font-size:13px;color:var(--muted);margin-bottom:24px;}
.q-card{background:#fff;border-radius:var(--radius);padding:20px;margin-bottom:16px;border-left:4px solid transparent;transition:border-color .2s;}
.q-num{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.q-text{font-family:"IBM Plex Sans",sans-serif;font-size:14px;font-weight:500;margin-bottom:14px;line-height:1.5;}
.q-opts{display:flex;flex-direction:column;gap:8px;}
.q-opt{text-align:left;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:10px 14px;font-family:"IBM Plex Sans",sans-serif;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text);}
.q-opt:hover:not(:disabled){background:var(--surface2);border-color:var(--navy);}
.q-opt:disabled{cursor:default;}
.q-opt.correct{background:rgba(160,136,96,0.18);border-color:var(--gold-deep);color:#2d6a2d;font-weight:600;}
.q-opt.wrong{background:rgba(155,43,43,0.10);border-color:#9b2b2b;color:#8b1a1a;}
.q-exp{font-family:"IBM Plex Sans",sans-serif;font-size:12px;line-height:1.6;color:var(--muted);margin-top:12px;padding-left:12px;border-left:3px solid var(--gold);display:none;}
.q-exp.show{display:block;}
.score-panel{background:#fff;border-radius:var(--radius);padding:28px;margin-top:24px;text-align:center;display:none;}
.score-panel.show{display:block;}
.score-big{font-family:"IBM Plex Mono",monospace;font-size:48px;font-weight:700;color:var(--navy);}
.score-grade{font-family:"IBM Plex Mono",monospace;font-size:22px;color:var(--muted);margin-top:4px;}
.score-comment{font-family:"IBM Plex Sans",sans-serif;font-size:14px;color:var(--muted);margin-top:12px;}
.score-retry{background:var(--navy);color:#fff;border:none;padding:10px 24px;border-radius:6px;font-family:"IBM Plex Mono",monospace;font-size:13px;cursor:pointer;margin-top:16px;}

/* CONTROLS */
.controls{flex:0 0 auto;background:#fff;border-top:1px solid var(--border);padding:12px 28px;display:flex;justify-content:space-between;align-items:center;gap:16px;}
.controls button{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 18px;font-family:"IBM Plex Mono",monospace;font-size:12px;cursor:pointer;border-radius:5px;transition:all .15s;}
.controls button:hover:not(:disabled){background:var(--navy);color:#fff;border-color:var(--navy);}
.controls button:disabled{opacity:0.3;cursor:not-allowed;}
.step-indicator{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:1px;}
.step-indicator .num{color:var(--navy);font-weight:600;}

/* MOBILE */
@media(max-width:900px){
  .stage:not(.cover):not(.quiz-stage){grid-template-columns:1fr;grid-template-rows:36vh 1fr;}
  .diagram-pane{padding:14px;border-right:none;border-bottom:1px solid var(--border);}
  .narrative-pane{padding:20px 18px;}
  .topbar{padding:0 16px;height:58px;}
  .brand-logo{height:38px;}
  .module-name{font-size:12px;}
  .module-sub{display:none;}
  .audio-toggle{font-size:10px;padding:5px 10px;}
  .chapter-bar{padding:0 16px;}
  .chapter-pill{padding:5px 11px;font-size:11px;}
  .controls{padding:10px 16px;}
  .cover-content h1{font-size:28px;}
  .cover-content h2{font-size:14px;}
  .cover-logo img{height:90px;}
  .pistos-watermark{bottom:8px;right:10px;}
  .pistos-watermark img{height:24px;}
  .pistos-watermark .wm-text{display:none;}
}
</style>
</head>

// =============================================================
// CHAPTER PILL BAR
// =============================================================
function renderChapterBar() {
  const bar = document.getElementById('chapterBar');
  let html = '';
  chapters.forEach((ch, i) => {
    const cls = ['chapter-pill'];
    if (pageIndex === i + 1) cls.push('active');
    if (visitedChapters.has(ch.id) && pageIndex !== i + 1) cls.push('done');
    html += `<button class="${cls.join(' ')}" onclick="gotoPage(${i + 1})">${ch.pill}</button>`;
  });
  // quiz pill
  const qcls = ['chapter-pill'];
  if (pageIndex === N_CHAPTERS + 1) qcls.push('active');
  html += `<button class="${qcls.join(' ')}" onclick="gotoPage(${N_CHAPTERS + 1})">Quiz</button>`;
  bar.innerHTML = html;
}

function setActiveBeat(idx) {
  currentBeatIndex = idx;
  const ch = chapters[pageIndex - 1];
  if (!ch) return;
  document.querySelectorAll('.beat').forEach((el, i) => {
    el.classList.remove('active');
    if (i <= idx) el.classList.add('visible');
    if (i < idx) el.classList.add('done');
    else el.classList.remove('done');
    if (i === idx) el.classList.add('active');
  });
  // SVG region states
  const activeRegion = ch.beats[idx].regionId;
  document.querySelectorAll('.svg-region').forEach(g => {
    const rid = g.getAttribute('data-region');
    g.classList.remove('dim', 'active');
    if (rid === activeRegion) g.classList.add('active');
    else g.classList.add('dim');
  });
  // scroll active beat into view
  const activeEl = document.querySelector(`.beat[data-beat="${idx}"]`);
  if (activeEl) {
    const pane = document.querySelector('.narrative-pane');
    if (pane) {
      const top = activeEl.offsetTop - pane.offsetTop - 20;
      pane.scrollTo({ top, behavior: 'smooth' });
    }
  }
}

function jumpToBeat(idx) {
  if (narrating) {
    stopNarration();
  }
  setActiveBeat(idx);
}

// =============================================================
// QUIZ
// =============================================================
function renderQuiz() {
  const stage = document.getElementById('stage');
  stage.className = 'stage quiz-stage';
  let html = `
    <div class="quiz-container">
      <div class="quiz-heading">KNOWLEDGE CHECK · CYBERSECURITY FUNDAMENTALS</div>
      <div class="quiz-sub">Six questions. Click the answer you believe is correct — feedback and an explanation follow each choice.</div>
  `;
  QUIZ.forEach((q, qi) => {
    let optsHtml = '';
    q.opts.forEach((o, oi) => {
      optsHtml += `<button class="q-opt" data-qi="${qi}" data-oi="${oi}" onclick="answerQ(${qi},${oi})">${o}</button>`;
    });
    html += `
      <div class="q-card" id="qc${qi}">
        <div class="q-num">QUESTION ${qi + 1}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-opts">${optsHtml}</div>
        <div class="q-exp" id="qe${qi}"></div>
      </div>`;
  });
  html += `
      <div class="score-panel" id="scorePanel">
        <div class="score-big" id="scoreBig"></div>
        <div class="score-grade" id="scoreGrade"></div>
        <div class="score-comment" id="scoreComment"></div>
        <button class="score-retry" onclick="retryQuiz()">Retry Quiz</button>
      </div>
    </div>
  `;
  stage.innerHTML = html;
  // restore any prior answers (non-destructive on re-render)
  quizAnswers.forEach((a, qi) => {
    if (a !== null) {
      const card = document.getElementById('qc' + qi);
      if (!card) return;
      card.querySelectorAll('.q-opt').forEach((o, i) => {
        o.disabled = true;
        if (i === QUIZ[qi].answer) o.classList.add('correct');
        else if (i === a) o.classList.add('wrong');
      });
      const exp = document.getElementById('qe' + qi);
      if (exp) { exp.textContent = QUIZ[qi].explain; exp.classList.add('show'); }
    }
  });
  if (quizAnswers.every(a => a !== null)) renderScorePanel();
}

function answerQ(qi, oi) {
  if (quizAnswers[qi] !== null) return;
  quizAnswers[qi] = oi;
  const card = document.getElementById('qc' + qi);
  card.querySelectorAll('.q-opt').forEach((o, i) => {
    o.disabled = true;
    if (i === QUIZ[qi].answer) o.classList.add('correct');
    else if (i === oi && oi !== QUIZ[qi].answer) o.classList.add('wrong');
  });
  const exp = document.getElementById('qe' + qi);
  if (exp) { exp.textContent = QUIZ[qi].explain; exp.classList.add('show'); }
  if (quizAnswers.every(a => a !== null)) renderScorePanel();
}

function renderScorePanel() {
  let correct = 0;
  quizAnswers.forEach((a, i) => { if (a === QUIZ[i].answer) correct++; });
  const total = QUIZ.length;
  const pct = Math.round(100 * correct / total);
  const panel = document.getElementById('scorePanel');
  const gradeMap = ['Keep reviewing','Keep reviewing','Keep reviewing','Passing','Good','Excellent','Perfect'];
  const commentMap = [
    'This material is important — review the explanations and try again.',
    'This material is important — review the explanations and try again.',
    'Foundation needs work. Review the chapters and retake the quiz.',
    'Solid effort. Review the questions you missed.',
    'Good performance. You understand most of the material well.',
    'Very strong — just one or two areas to revisit.',
    'Outstanding — perfect score. You have mastered this module.',
  ];
  document.getElementById('scoreBig').textContent = correct + ' / ' + total + '  ·  ' + pct + '%';
  document.getElementById('scoreGrade').textContent = gradeMap[correct] || '';
  document.getElementById('scoreComment').textContent = commentMap[correct] || '';
  panel.classList.add('show');
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}

function retryQuiz() {
  quizAnswers = new Array(QUIZ.length).fill(null);
  renderQuiz();
  window.scrollTo(0, 0);
}

// =============================================================
// MAIN RENDER + NAVIGATION
// =============================================================
function render() {
  stopNarration();
  if (pageIndex === 0) {
    renderCover();
  } else if (pageIndex >= 1 && pageIndex <= N_CHAPTERS) {
    renderChapter(pageIndex - 1);
  } else if (pageIndex === N_CHAPTERS + 1) {
    renderQuiz();
  }
  renderChapterBar();
  document.getElementById('stepCur').textContent = pageIndex + 1;
  document.getElementById('stepTotal').textContent = TOTAL_PAGES;
  document.getElementById('prevBtn').disabled = pageIndex === 0;
  document.getElementById('nextBtn').disabled = pageIndex === TOTAL_PAGES - 1;
}

function next() {
  // Within a chapter, advance beats first
  if (pageIndex >= 1 && pageIndex <= N_CHAPTERS) {
    const ch = chapters[pageIndex - 1];
    if (currentBeatIndex < ch.beats.length - 1) {
      setActiveBeat(currentBeatIndex + 1);
      return;
    }
  }
  if (pageIndex < TOTAL_PAGES - 1) {
    pageIndex++;
    render();
  }
}

function prev() {
  if (pageIndex >= 1 && pageIndex <= N_CHAPTERS) {
    if (currentBeatIndex > 0) {
      setActiveBeat(currentBeatIndex - 1);
      return;
    }
  }
  if (pageIndex > 0) {
    pageIndex--;
    render();
  }
}

function gotoPage(idx) {
  if (idx >= 0 && idx < TOTAL_PAGES) {
    pageIndex = idx;
    render();
  }
}

// =============================================================
// NARRATION
// =============================================================
function toggleAudio() {
  if (narrating) { stopNarration(); return; }
  // Only narrate inside chapters
  if (pageIndex < 1 || pageIndex > N_CHAPTERS) return;
  startNarration();
}

function startNarration() {
  if (!('speechSynthesis' in window)) return;
  narrating = true;
  document.getElementById('audioLabel').textContent = 'Stop narration';
  const ch = chapters[pageIndex - 1];
  speakBeat(ch, 0);
}

function speakBeat(ch, idx) {
  if (!narrating) return;
  if (idx >= ch.beats.length) {
    stopNarration();
    return;
  }
  setActiveBeat(idx);
  // strip HTML for TTS
  const text = ch.beats[idx].body.replace(/<[^>]+>/g, '');
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.95; utter.pitch = 1; utter.volume = 1;
  utter.onend = function () {
    if (narrating) {
      setTimeout(() => speakBeat(ch, idx + 1), 400);
    }
  };
  narrUtter = utter;
  window.speechSynthesis.speak(utter);
}

function stopNarration() {
  narrating = false;
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  narrUtter = null;
  const lbl = document.getElementById('audioLabel');
  if (lbl) lbl.textContent = 'Play narration';
}

// =============================================================
// KEYBOARD
// =============================================================
document.addEventListener('keydown', function (e) {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

// =============================================================
// BOOT
// =============================================================
render();
</script>
</body>
</html>
